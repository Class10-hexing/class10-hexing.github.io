<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级登录</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
    body{background:#f4f7ff;display:grid;place-items:center;height:100vh}
    .login{background:white;padding:40px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1);width:100%;max-width:400px}
    h2{text-align:center;margin-bottom:24px}
    input{width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
    button{width:100%;padding:14px;background:#0d6efd;color:white;border:none;border-radius:8px;font-size:16px;margin-top:10px;cursor:pointer}
    button:hover{background:#0b5ed7}
    #msg{color:red;text-align:center;margin-top:12px;display:none}
</style>
</head>
<body>

<div class="login">
    <h2>Class10 班级登录</h2>
    <input type="text" id="user" placeholder="账号">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
    <div id="msg">账号或密码错误</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
async function login() {
    let username = document.getElementById("user").value.trim();
    let password = document.getElementById("pwd").value.trim();
    let msg = document.getElementById("msg");
    msg.style.display = "none";

    if (!username || !password) {
        msg.innerText = "请输入账号和密码";
        msg.style.display = "block";
        return;
    }

    try {
        // ✅ 修复：正确读取 Excel 中文编码
        let res = await fetch("/name.xls");
        let blob = await res.blob();
        let data = await readBlobAsArrayBuffer(blob);
        
        let workbook = XLSX.read(data, { 
            type: "array",
            codepage: 936 // ✅ 强制中文编码（GBK）
        });
        
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        let users = XLSX.utils.sheet_to_json(sheet);

        // 打印查看读取到的数据（方便你调试）
        console.log("读取到用户列表：", users);

        // ✅ 宽松匹配，避免类型问题
        let ok = users.some(u => 
            String(u.username).trim() === username && 
            String(u.password).trim() === password
        );

        if (ok) {
            alert("登录成功！");
            location.href = "/";
        } else {
            msg.innerText = "账号或密码错误";
            msg.style.display = "block";
        }
    } catch (e) {
        console.error(e);
        msg.innerText = "读取用户文件失败，请检查 name.xls 是否存在";
        msg.style.display = "block";
    }
}

// ✅ 辅助函数：正确处理中文编码
function readBlobAsArrayBuffer(blob) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsArrayBuffer(blob);
    });
}
</script>

</body>
