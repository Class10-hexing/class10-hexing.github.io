
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级登录</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
    body{background:#f4f7ff;display:grid;place-items:center;height:100vh}
    .login{background:white;padding:40px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1);width:100%;max-width:400px}
    h2{text-align:center;margin-bottom:24px}
    input{width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
    button{width:100%;padding:14px;background:#0d6efd;color:white;border:none;border-radius:8px;font-size:16px;margin-top:10px;cursor:pointer}
    button:hover{background:#0b5ed7}
    #msg{color:red;text-align:center;margin-top:12px;display:none}
</style>
</head>
<body>

<div class="login">
    <h2>Class10 班级登录</h2>
    <input type="text" id="user" placeholder="账号">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
    <div id="msg">账号或密码错误</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
async function login() {
    let user = document.getElementById("user").value.trim();
    let pwd = document.getElementById("pwd").value.trim();
    let msg = document.getElementById("msg");
    msg.style.display = "none";

    if (!user || !pwd) {
        msg.innerText = "请输入账号和密码";
        msg.style.display = "block";
        return;
    }

    try {
        // 读取 Excel（绝对不会乱码的读取方式）
        const response = await fetch("/name.xls");
        const buffer = await response.arrayBuffer();
        
        // 👇 这一行是关键：强制中文编码，彻底解决乱码
        const workbook = XLSX.read(buffer, { type: "buffer", codepage: 936 });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const userList = XLSX.utils.sheet_to_json(firstSheet);

        console.log("读取到的数据：", userList); // 看这里！中文正常就一定能登录

        // 匹配（兼容数字、字符串、中文、前后空格）
        const success = userList.some(item => 
            String(item.username || "").trim() === user &&
            String(item.password || "").trim() === pwd
        );

        if (success) {
            alert("登录成功！");
            location.href = "/";
        } else {
            msg.innerText = "账号或密码错误";
            msg.style.display = "block";
        }

    } catch (err) {
        console.error(err);
        msg.innerText = "找不到 name.xls 文件 或 文件格式错误";
        msg.style.display = "block";
    }
}
</script>
</body>
</html>
