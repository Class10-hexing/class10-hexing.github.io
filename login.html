<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班级登录</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
    body{background:#f4f7ff;display:grid;place-items:center;height:100vh}
    .login{background:white;padding:40px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1);width:100%;max-width:400px}
    h2{text-align:center;margin-bottom:24px}
    input{width:100%;padding:14px;margin:8px 0;border:1px solid #ddd;border-radius:8px;font-size:16px}
    button{width:100%;padding:14px;background:#0d6efd;color:white;border:none;border-radius:8px;font-size:16px;margin-top:10px;cursor:pointer}
    button:hover{background:#0b5ed7}
    #msg{color:red;text-align:center;margin-top:12px;display:none}
</style>
</head>
<body>

<div class="login">
    <h2>Class10 班级登录</h2>
    <input type="file" id="excelFile" style="display:none;" accept=".xlsx,.xls">
    <input type="text" id="user" placeholder="账号">
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
    <div id="msg">账号或密码错误</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let userList = [];

// 页面加载时自动读取 name.xlsx（支持中文）
window.onload = async function() {
    try {
        const response = await fetch("name.xlsx");
        const data = await response.arrayBuffer();
        const workbook = XLSX.read(data, {
            type: "array",
            codepage: 936,       // GBK 中文编码
            cellText: false,
            cellDates: true
        });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        userList = XLSX.utils.sheet_to_json(sheet);
        console.log("用户列表（已修复中文）：", userList);
    } catch (e) {
        console.log("未找到在线文件，将使用手动选择文件");
    }
};

// 登录验证
async function login() {
    let user = document.getElementById("user").value.trim();
    let pwd = document.getElementById("pwd").value.trim();
    let msg = document.getElementById("msg");
    msg.style.display = "none";

    if (!user || !pwd) {
        msg.innerText = "请输入账号和密码";
        msg.style.display = "block";
        return;
    }

    // 匹配账号密码（支持中文、数字、字符串）
    const ok = userList.some(item => {
        let name = String(item.username || item.账号 || "").trim();
        let psw = String(item.password || item.密码 || "").trim();
        return name === user && psw === pwd;
    });

    if (ok) {
        alert("登录成功！");
        location.href = "/";
    } else {
        msg.innerText = "账号或密码错误";
        msg.style.display = "block";
    }
}
</script>
</body>
</html>
