<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>H5贪吃蛇</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, sans-serif;
}
body{
  background:#121212;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 10px;
  color:#fff;
}
#gameBox{
  border:3px solid #39c5bb;
  background:#000;
  max-width:100vw;
}
.info{
  font-size:18px;
  margin-bottom:8px;
}
#score{
  color:#39c5bb;
  font-weight:bold;
  font-size:22px;
}
.btns{
  margin:12px 0;
  display:flex;
  gap:10px;
}
button{
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#39c5bb;
  color:#000;
  font-size:15px;
}
.tip{
  font-size:13px;
  color:#aaa;
  text-align:center;
  margin-top:10px;
  line-height:1.5;
}
</style>
</head>
<body>
<div class="info">得分：<span id="score">0</span></div>

<canvas id="gameBox" width="360" height="360"></canvas>

<div class="btns">
  <button id="restart">重新开始</button>
  <button id="pause">暂停/继续</button>
</div>

<div class="tip">
电脑：方向键控制，<b>按空格键开始游戏</b><br>
手机：手指在画布滑动操控
</div>

<script>
const canvas = document.getElementById('gameBox');
const ctx = canvas.getContext('2d');
const scoreText = document.getElementById('score');
const btnRestart = document.getElementById('restart');
const btnPause = document.getElementById('pause');

const size = 18;
const count = canvas.width / size;
const speedInterval = 180;
let timer = null;
let isPause = false;
let isStart = false; // 是否已经开局
let score = 0;

let snake = [{x:8, y:8}];
let dir = {x:1, y:0};
let nextDir = {x:1, y:0};
let food = createFood();

// 生成食物
function createFood(){
  let x,y;
  while(true){
    x = Math.floor(Math.random()*count);
    y = Math.floor(Math.random()*count);
    let overlap = false;
    for(let s of snake){
      if(s.x===x && s.y===y){overlap=true;break;}
    }
    if(!overlap) break;
  }
  return {x,y};
}

// 初始绘制提示文字
function drawWaitTip(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#39c5bb';
  ctx.font="18px system-ui";
  ctx.textAlign="center";
  ctx.fillText("按下空格键开始游戏", canvas.width/2, canvas.height/2);
}

// 重置游戏
function resetGame(){
  clearInterval(timer);
  isPause = false;
  isStart = false;
  score = 0;
  scoreText.textContent = score;
  snake = [{x:8, y:8}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  food = createFood();
  drawWaitTip();
}

// 启动游戏循环
function startGameLoop(){
  timer = setInterval(gameLoop, speedInterval);
}

// 游戏主逻辑
function gameLoop(){
  if(isPause) return;
  dir = {...nextDir};
  const head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  // 撞墙
  if(head.x<0 || head.x>=count || head.y<0 || head.y>=count){
    alert('游戏结束，得分：'+score);
    resetGame();
    return;
  }

  // 撞自己
  for(let seg of snake){
    if(seg.x===head.x && seg.y===head.y){
      alert('游戏结束，得分：'+score);
      resetGame();
      return;
    }
  }

  snake.unshift(head);
  if(head.x === food.x && head.y === food.y){
    score += 10;
    scoreText.textContent = score;
    food = createFood();
  }else{
    snake.pop();
  }

  // 渲染画布
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#39c5bb';
  snake.forEach(seg=>{
    ctx.fillRect(seg.x*size, seg.y*size, size-1, size-1);
  });

  ctx.fillStyle='#ff5555';
  ctx.fillRect(food.x*size, food.y*size, size-1, size-1);
}

// 键盘监听：空格开局 + 方向控制
document.addEventListener('keydown',e=>{
  // 空格开启游戏
  if(e.code === 'Space'){
    if(!isStart){
      isStart = true;
      startGameLoop();
    }
    return;
  }
  if(!isStart || isPause) return;
  switch(e.key){
    case 'ArrowUp': if(dir.y!==1) nextDir={x:0,y:-1}; break;
    case 'ArrowDown': if(dir.y!==-1) nextDir={x:0,y:1}; break;
    case 'ArrowLeft': if(dir.x!==1) nextDir={x:-1,y:0}; break;
    case 'ArrowRight': if(dir.x!==-1) nextDir={x:1,y:0}; break;
  }
});

// 移动端触屏滑动
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!isStart || isPause) return;
  const endX = e.changedTouches[0].clientX;
  const endY = e.changedTouches[0].clientY;
  const dx = endX - touchStartX;
  const dy = endY - touchStartY;

  if(Math.abs(dx) > Math.abs(dy)){
    if(dx>20 && dir.x!==-1) nextDir={x:1,y:0};
    else if(dx<-20 && dir.x!==1) nextDir={x:-1,y:0};
  }else{
    if(dy>20 && dir.y!==-1) nextDir={x:0,y:1};
    else if(dy<-20 && dir.y!==1) nextDir={x:0,y:-1};
  }
});

// 按钮事件
btnRestart.onclick = resetGame;
btnPause.onclick = ()=>{
  if(!isStart) return;
  isPause = !isPause;
  btnPause.textContent = isPause ? '继续' : '暂停/继续';
};

// 页面载入先绘制等待提示
drawWaitTip();
</script>
</body>
</html>
