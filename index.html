<script>
window.addEventListener('DOMContentLoaded', function(){
    const loginInfo = ClassLogin.getLogin();
    const userNameShow = document.getElementById('userNameShow');
    const adminConfigBtn = document.getElementById('adminConfigBtn');

    if (!loginInfo) {
        // 未登录：显示文字为登录，点击跳转到登录页
        userNameShow.innerText = '登录';
        userNameShow.setAttribute('href', './login.html');
        userNameShow.classList.remove('dropdown-toggle');
        adminConfigBtn.classList.add('d-none');
    } else {
        // 已登录：显示当前登录姓名，开启下拉菜单
        userNameShow.innerText = loginInfo.userName;
        userNameShow.removeAttribute('href');
        userNameShow.classList.add('dropdown-toggle');

        // 只有管理员显示后台配置按钮
        if (loginInfo.role === 'admin') {
            adminConfigBtn.classList.remove('d-none');
        } else {
            adminConfigBtn.classList.add('d-none');
        }
    }
})
</script>
